enabled_layouts splits,stack
window_padding_width 4

font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

hide_window_decorations titlebar-only
scrollback_lines 1000
allow_remote_control yes
confirm_os_window_close 1

tab_title_template "{'󰙀 ' if layout_name == 'splits' else '󱂬 '}{title}"
tab_title_max_length 25
tab_bar_style powerline
tab_powerline_style round

map ctrl+tab noop
map cmd+opt+s noop
map cmd+m noop
map cmd+t new_tab_with_cwd
map cmd+w close_window
map cmd+left previous_tab
map cmd+right next_tab

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map cmd+h neighboring_window left
map cmd+l neighboring_window right
map cmd+k neighboring_window up
map cmd+j neighboring_window down

map cmd+e launch --location=vsplit --cwd=current
map cmd+n launch --location=hsplit --cwd=current

fzf --fish | source
map cmd+p send_text all \e[99;6u


dim_inactive_windows true
inactive_text_alpha 0.1

map cmd+f toggle_layout stack

# BEGIN_KITTY_THEME
# Kanagawa_dragon
include current-theme.conf
# END_KITTY_THEME
